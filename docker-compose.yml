# ============================================================
# XtremeShop 完整容器编排（Phase 3 — 后端容器化）
#
# 服务拓扑：
#   mysql   ← 初始化 xtreme_shop 库（首次启动自动建表）
#   redis   ← key 空间 database:10，与其他项目隔离
#   backend ← Spring Boot（连接容器内 mysql/redis）
#   nginx   ← 静态文件 + /api/* 反代 backend:8080
#
# 宿主机端口映射（仅供调试工具访问，容器间通信走内部网络）：
#   3307 → mysql:3306   （DBeaver 连接用 localhost:3307）
#   6380 → redis:6379   （redis-cli -p 6380 调试用）
#   8080 → backend:8080 （Postman/Swagger 直连后端用）
#   80   → nginx:80     （浏览器访问入口）
#
# 首次启动：docker compose up -d --build
# 清理重建：docker compose down -v && docker compose up -d --build
# ============================================================

networks:
  xtreme-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:

  # ──────────────────── MySQL ────────────────────────────────
  # 首次启动时自动执行 docker/mysql/init/ 下的全部 .sql 初始化脚本
  # 宿主机端口 3307 避免与其他项目的 3306 冲突
  mysql:
    image: mysql:8.0
    container_name: xtreme-mysql
    restart: unless-stopped
    networks:
      - xtreme-net
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-xtremeShop_dev}
      MYSQL_DATABASE: xtreme_shop
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-xtremeShop_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────── Redis ────────────────────────────────
  # 宿主机端口 6380 避免与其他项目的 6379 冲突
  redis:
    image: redis:7-alpine
    container_name: xtreme-redis
    restart: unless-stopped
    networks:
      - xtreme-net
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ──────────────────── Backend（Spring Boot）────────────────
  # 多阶段构建：maven:3.9-eclipse-temurin-17 → eclipse-temurin:17-jre-alpine
  # 等待 mysql/redis 健康后才启动（depends_on + condition: service_healthy）
  backend:
    build:
      context: ./xtreme_backend
      dockerfile: Dockerfile
    container_name: xtreme-backend
    restart: unless-stopped
    networks:
      - xtreme-net
    ports:
      - "8080:8080"
    environment:
      # 容器内激活 prod profile（关闭 MyBatis SQL 日志，使用 application-prod.yml）
      SPRING_PROFILES_ACTIVE: prod
      # 覆盖 application-prod.yml 中的默认 127.0.0.1，指向容器服务名
      DB_HOST: mysql
      DB_PASSWORD: ${DB_PASSWORD:-xtremeShop_dev}
      REDIS_HOST: redis
      # OSS 配置（可选，不填则 OSS 上传功能不可用）
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────── Nginx（前端容器）────────────────────
  # 多阶段构建：node:20-alpine 编译 Vue → nginx:alpine serve
  # 访问入口：http://localhost
  # API 反代：/api/* → backend:8080（Docker 内部网络）
  nginx:
    build:
      context: ./xtreme_frontend
      dockerfile: Dockerfile
    container_name: xtreme-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - xtreme-net
    depends_on:
      - backend
