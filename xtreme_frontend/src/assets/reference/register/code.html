<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff6600",
                        "background-light": "#f8f7f5",
                        "background-dark": "#23170f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans SC", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Top Navigation / Logo Section -->
<header class="w-full flex justify-center py-12">
<div class="flex flex-col items-center gap-4">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary rounded-lg text-white">
<span class="material-symbols-outlined text-3xl">shopping_cart</span>
</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">Xtreme-Shop</h1>
</div>
<p class="text-slate-500 dark:text-slate-400 text-lg">极致购物，极致体验</p>
</div>
</header>
<!-- Registration Form Container -->
<main class="flex-1 flex justify-center px-4 pb-20">
<div class="w-full max-w-[480px]">
<div class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-xl p-8 border border-slate-100 dark:border-slate-800">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 text-center">创建新账号</h2>
<form class="space-y-6">
<!-- Phone Number -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">手机号</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-xl">smartphone</span>
<input class="w-full pl-12 pr-4 h-14 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-900 dark:text-slate-100" placeholder="请输入手机号" type="tel"/>
</div>
</div>
<!-- Verification Code -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">验证码</label>
<div class="flex gap-3">
<div class="relative flex-1">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-xl">verified_user</span>
<input class="w-full pl-12 pr-4 h-14 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-900 dark:text-slate-100" placeholder="请输入验证码" type="text"/>
</div>
<button class="px-6 h-14 bg-primary/10 text-primary font-semibold rounded-lg hover:bg-primary/20 transition-colors whitespace-nowrap border border-primary/20" type="button">
                                获取验证码
                            </button>
</div>
</div>
<!-- Password Setting -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">设置密码</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-xl">lock</span>
<input class="w-full pl-12 pr-12 h-14 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-900 dark:text-slate-100" placeholder="6-16位字母或数字" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Agreement -->
<div class="flex items-start gap-2 px-1">
<input class="mt-1 rounded border-slate-300 text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-sm text-slate-500 dark:text-slate-400" for="terms">
                            我已阅读并同意 <a class="text-primary hover:underline" href="#">用户协议</a> 和 <a class="text-primary hover:underline" href="#">隐私政策</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary hover:bg-orange-600 text-white font-bold text-lg rounded-lg shadow-lg shadow-primary/30 transition-all active:scale-[0.98]" type="submit">
                        立即注册
                    </button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-slate-600 dark:text-slate-400">
                        已有账号？
                        <a class="text-primary font-bold hover:underline ml-1" href="#">登录</a>
</p>
</div>
</div>
<!-- Social Registration (Optional/Symmetric touch) -->
<div class="mt-10">
<div class="relative flex items-center gap-4 mb-6">
<div class="flex-1 h-[1px] bg-slate-200 dark:bg-slate-800"></div>
<span class="text-slate-400 text-sm">其他注册方式</span>
<div class="flex-1 h-[1px] bg-slate-200 dark:bg-slate-800"></div>
</div>
<div class="flex justify-center gap-6">
<button class="w-12 h-12 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-600 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined">chat</span>
</button>
<button class="w-12 h-12 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-600 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined">mail</span>
</button>
</div>
</div>
</div>
</main>
<!-- Minimalist Footer -->
<footer class="py-8 text-center text-slate-400 text-xs">
        © 2024 Xtreme-Shop. All rights reserved.
    </footer>
</body></html>
